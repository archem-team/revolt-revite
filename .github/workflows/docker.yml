    publish:
        # needs: [test]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        if: github.event_name != 'pull_request'
        steps:
            - name: Checkout
              uses: actions/checkout@v2
              with:
                  submodules: "recursive"
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v1
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2
            - name: Docker meta
              id: meta
              uses: docker/metadata-action@v3
              with:
                  images: ghcr.io/archem-team/revolt-revite-stage
                  tags: |
                    type=raw,value=${{ github.sha }}
            # - name: Login to DockerHub
            #   uses: docker/login-action@v1
            #   with:
            #       username: ${{ secrets.DOCKERHUB_USERNAME }}
            #       password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Login to Github Container Registry
              uses: docker/login-action@v1
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and publish
              uses: docker/build-push-action@v4
              with:
                  context: .
                  push: true
                  platforms: linux/amd64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
    deploy:
        needs: [publish]
        runs-on: ubuntu-latest
        env:
          CONFIG_BRANCH: stage
          CLONE_DIR: $GITHUB_WORKSPACE/config
          CONFIG_FILE: $GITHUB_WORKSPACE/config/apps/pepchat/kustomization.yaml
        if: github.event_name != 'pull_request'
        steps:
            - name: Set up deploy key
              run: |
                  mkdir -p ~/.ssh
                  printf '%s\n' "${{ secrets.ARCHEM_CONFIG_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
            - name: Checkout Configuration Repository
              run: |
                  echo "Cloning configuration repository"
                  git clone -b $CONFIG_BRANCH git@github.com:archem-team/administration-cluster.git $CLONE_DIR
            
            - name: Set Up Git Identity
              run: |
                  cd $CLONE_DIR
                  git config user.email "ci@example.com"
                  git config user.name "CI Bot"


            - name: Update Image Tag in kustomization.yaml
              run: |
                  awk -v value="  newTag: ${{ github.sha }}" '{sub(/^  newTag: .*/, value); print}' $CONFIG_FILE > temp.yml && mv temp.yml $CONFIG_FILE

                  awk -v value="  newName: ghcr.io/archem-team/revolt-revite-stage" '{sub(/^  newName: .*/, value); print}' $CONFIG_FILE > temp.yml && mv temp.yml $CONFIG_FILE


            - name: Commit & Push Changes
              run: |
                  cd $CLONE_DIR
                  git add .
                  git commit -am "Update image tag to ${{ github.sha }}" || echo "no changes"
         
                  git push origin $CONFIG_BRANCH  
                  
          
                  
    
